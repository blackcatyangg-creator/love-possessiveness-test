<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>付出型还是被爱型测试 - 黑猫测测</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/test.css">
</head>
<body>
    <div class="falling-hearts" id="fallingHearts"></div>
    
    <div class="container">
        <!-- 返回按钮 -->
        <a href="../index.html" class="back-link">← 返回测试列表</a>
        
        <!-- 封面页面 -->
        <div class="cover-page" id="coverPage">
            <div class="cover-content">
                <div class="cover-avatar">
                    <img src="../images/cat.png" alt="付出型被爱型测试">
                </div>
                <h1 class="cover-title">💝 付出型还是被爱型</h1>
                <p class="cover-subtitle">20道题，测出你爱人的真实模式<br>你是付出型还是被爱型？</p>
                
                <div class="cover-stats">
                    <div class="cover-stat-item">
                        <span class="cover-stat-number">20</span>
                        <span class="cover-stat-label">道题目</span>
                    </div>
                    <div class="cover-stat-item">
                        <span class="cover-stat-number">5</span>
                        <span class="cover-stat-label">种类型</span>
                    </div>
                    <div class="cover-stat-item">
                        <span class="cover-stat-number">4</span>
                        <span class="cover-stat-label">个选项</span>
                    </div>
                </div>
                
                <button class="cover-btn" onclick="startTest()">开始测试</button>
            </div>
        </div>

        <!-- 测试页面 -->
        <div class="test-page" id="testPage" style="display: none;">
            <div class="test-header">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text">
                    <span id="currentQuestion">1</span> / <span id="totalQuestions">20</span>
                </div>
            </div>
            
            <div class="question-container" id="questionContainer">
                <!-- 题目将通过JS动态插入 -->
            </div>
        </div>

        <!-- 结果页面 -->
        <div class="result-page" id="resultPage" style="display: none;">
            <div class="result-content">
                <div class="result-icon" id="resultIcon">🎀</div>
                <h2 class="result-title" id="resultTitle">测试结果</h2>
                <div class="result-score" id="resultScore">0分</div>
                <p class="result-desc" id="resultDesc">结果描述</p>
                
                <div class="result-details" id="resultDetails">
                    <!-- 详细分析 -->
                </div>
                
                <div class="result-actions">
                    <button class="result-btn primary" onclick="restartTest()">重新测试</button>
                    <button class="result-btn secondary" onclick="shareResult()">分享结果</button>
                </div>
                
                <a href="../index.html" class="back-home">返回首页</a>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/confetti.js"></script>
    <script src="../js/giving-receiving.js"></script>
</body>
</html>
