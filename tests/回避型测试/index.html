                    { value: 3, text: "会认真考虑，哪怕暂时做不到，也会给出明确时间表，不会逃避" },

                ]},

                ]}

        let currentQuestionIndex = 0;
        let answers = [];

        function startTest() {
            document.getElementById('coverPage').style.display = 'none';
            document.getElementById('testPage').style.display = 'block';
            document.getElementById('totalQuestions').textContent = testData.questions.length;
            showQuestion();
        }

        function showQuestion() {
            const question = testData.questions[currentQuestionIndex];
            const progress = ((currentQuestionIndex + 1) / testData.questions.length) * 100;
            
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            
            let html = '';
            if (question.section) {
                html += `<div class="section-title">${question.section}</div>`;
            }
            
            html += `<div class="question-title">${question.text}</div>`;
            html += '<div class="options-list">';
            
            question.options.forEach((option, index) => {
                html += `<button class="option-item" onclick="selectOption(${option.value})">${option.text}</button>`;
            });
            
            html += '</div>';
            document.getElementById('questionContainer').innerHTML = html;
        }

        function selectOption(value) {
            answers.push(value);
            currentQuestionIndex++;
            
            if (currentQuestionIndex < testData.questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('testPage').style.display = 'none';
            document.getElementById('resultPage').style.display = 'block';
            
            const totalScore = answers.reduce((a, b) => a + b, 0);
            const maxScore = testData.questions.length * 3;
            const percentage = Math.round((totalScore / maxScore) * 100);
            
            let result = {};
            if (percentage >= 70) {
                result = {
                    icon: '💙',
                    title: '他是回避型依恋',
                    level: '他在意你，只是「不会爱」',
                    desc: '他的冷漠、疏离、逃避，源于内心的恐惧和不安全感，而非对你的不在意。',
                    details: [
                        '他会主动（虽然不多），会回应（虽然简短），会在意（虽然隐藏）',
                        '他害怕被抛弃，所以先推开你；害怕被看穿，所以保持距离',
                        '他需要被理解、被接纳，需要一个安全的港湾',
                        '如果你愿意给他时间和空间，他会慢慢学会爱你'
                    ]
                };
            } else if (percentage >= 40) {
                result = {
                    icon: '💜',
                    title: '处于模糊地带',
                    level: '态度暧昧，难以判断',
                    desc: '他的态度时冷时热，既有回避的特征，也有不够喜欢的表现。',
                    details: [
                        '他可能对你有好感，但不足以让他主动推进关系',
                        '他可能更爱自己，把你看作「备选」而非「唯一」',
                        '建议直接沟通，明确关系定位，不要再猜',
                        '如果长时间没有进展，建议及时止损'
                    ]
                };
            } else {
                result = {
                    icon: '🖤',
                    title: '他根本不喜欢你',
                    level: '冷漠不是回避，是不在意',
                    desc: '他的疏离、敷衍、不主动，不是「不会爱」，而是「不想爱」。',
                    details: [
                        '他不会主动、不会回应、不会在意你的感受',
                        '他对你没有占有欲、没有好奇心、没有未来规划',
                        '他的冷漠是真实的，不是伪装',
                        '建议及时止损，不要浪费时间和感情'
                    ]
                };
            }
            
            document.getElementById('resultIcon').textContent = result.icon;
            document.getElementById('resultTitle').textContent = result.title;
            document.getElementById('resultScore').textContent = totalScore + '分';
            document.getElementById('resultLevel').textContent = result.level;
            document.getElementById('resultDesc').textContent = result.desc;
            
            let detailsHtml = '<h3>详细分析</h3><ul>';
            result.details.forEach(detail => {
                detailsHtml += `<li>${detail}</li>`;
            });
            detailsHtml += '</ul>';
            document.getElementById('resultDetails').innerHTML = detailsHtml;
        }

        function restartTest() {
            currentQuestionIndex = 0;
            answers = [];
            document.getElementById('resultPage').style.display = 'none';
            document.getElementById('coverPage').style.display = 'flex';
        }

        function shareResult() {
            if (navigator.share) {
                navigator.share({
                    title: document.title,
                    text: '来看看我的测试结果吧！',
                    url: window.location.href
                }).catch(err => console.log('分享失败', err));
            } else {
                navigator.clipboard.writeText(window.location.href).then(() => {
                    alert('链接已复制到剪贴板！');
                });
            }
        }
    </script>
</body>
</html>
